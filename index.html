<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Práctica de Números</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 500px;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

h1 {
  font-size: 22px;
}

.question {
  font-size: 20px;
  margin: 20px 0;
}

.btn {
  display: block;
  margin: 10px 0;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #334155;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #475569;
}

.correct {
  background: #16a34a !important;
}

.wrong {
  background: #dc2626 !important;
}

.progress {
  font-size: 14px;
  opacity: 0.7;
}
</style>

</head>
<body>

<div class="container">
  <h1>Práctica de Números</h1>
  <div class="progress" id="progress"></div>
  <div class="question" id="question"></div>
  <div id="answers"></div>
</div>

<script>
const questions = [
  {q: "¿Qué tipo de número es 5?", a: "Natural", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es -3?", a: "Entero", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es 1/2?", a: "Racional", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es √2?", a: "Irracional", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es 0?", a: "Entero", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es 10?", a: "Natural", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es -7?", a: "Entero", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es 3/4?", a: "Racional", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es π?", a: "Irracional", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es 15?", a: "Natural", options: ["Natural","Entero","Racional","Irracional"]},

  {q: "¿Qué tipo de número es -1?", a: "Entero", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es 2/3?", a: "Racional", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es √3?", a: "Irracional", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es 8?", a: "Natural", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es -10?", a: "Entero", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es 7/8?", a: "Racional", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es e?", a: "Irracional", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es 20?", a: "Natural", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es -15?", a: "Entero", options: ["Natural","Entero","Racional","Irracional"]},
  {q: "¿Qué tipo de número es 9/5?", a: "Racional", options: ["Natural","Entero","Racional","Irracional"]}
];

let current = 0;
let score = 0;

function loadQuestion() {
  document.getElementById("progress").innerText = `Pregunta ${current+1} de ${questions.length}`;
  document.getElementById("question").innerText = questions[current].q;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  questions[current].options.forEach(option => {
    const btn = document.createElement("button");
    btn.classList.add("btn");
    btn.innerText = option;
    btn.onclick = () => checkAnswer(btn, option);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(btn, selected) {
  const correct = questions[current].a;

  if (selected === correct) {
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("wrong");
  }

  setTimeout(() => {
    current++;
    if (current < questions.length) {
      loadQuestion();
    } else {
      document.querySelector(".container").innerHTML =
        `<h1>Resultado</h1>
         <p>Obtuviste ${score} de ${questions.length}</p>`;
    }
  }, 800);
}

loadQuestion();
</script>

</body>
</html>
